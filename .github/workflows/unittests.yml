name: Unit Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pytest
          pip install langchain langchain-community langchain-text-splitters langchain-core
          pip install sentence-transformers faiss-cpu
          pip install transformers torch --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Verify imports
        run: |
          python -c "import pandas; import numpy; import faiss; print('Core imports OK')"
          python -c "from langchain_community.vectorstores import FAISS; print('FAISS LangChain OK')"

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short --no-header
        env:
          PYTHONDONTWRITEBYTECODE: 1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            .pytest_cache/
          retention-days: 7
